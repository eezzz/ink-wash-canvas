// ---------- Shaders ----------
function compileShader(type, source) {

  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));

    gl.linkProgram(this.program);

const baseVertex = compileShader(gl.VERTEX_SHADER, `#version 300 es

const splatProgram = new Program(`#version 300 es

uniform float aspectRatio;

  float centerSolid = 1.0 - smoothstep(0.35, 0.75, abs(across));

float hash (vec2 p) {

  p += dot(p, p + 45.32);

}
float vnoise (vec2 p) {
  vec2 i = floor(p), f = fract(p);

  float a = hash(i), b = hash(i + vec2(1.0, 0.0));

    vec3 paper = vec3(0.958, 0.942, 0.905);

    // è½ä¸‹ç¼“å†²çš„å°¾æ®µï¼šå¿«ææŒ‰æ¯›ç¬”å½¢æ€æ”¶é”‹ï¼›æ…¢åœé¡¿æ”¶åœ†å¤´
    const fast = stroke.speed > 0.3 && performance.now() - stroke.t < 120;
    dbg && dbg(`END: ${fast ? 'TAPER' : 'BLUNT'} spd=${stroke.speed.toFixed(2)} idle=${(performance.now() - stroke.t).toFixed(0)}ms tail=${stroke.tailPts.length} curv=${stroke.curv.toFixed(1)}`);
    const pts = stroke.tailPts;
    const S = stroke.travel;
    const L = Math.max(S - pts[0].s, 1e-6);
    const aspect = canvas.width / canvas.height;
    // æ¯›ç¬”å½¢æ€ï¼šé”‹å°–è´´ç¬”ç”»ä¸€ä¾§è¾¹ç¼˜æ”¶æ‹¢ï¼ˆå¼§çº¿å–å†…ä¾§ï¼Œç›´çº¿å¾®åä¸€ä¾§ï¼‰ï¼Œéžå¯¹ç§°åœ†é”¥
    const curv = Math.max(-8, Math.min(8, stroke.curv));
    const side = Math.abs(curv) > 0.8 ? -Math.sign(curv) : 0.6;
    let endW = 0;
    for (const q of pts) {
      if (fast) {
        const f = Math.max((S - q.s) / L, 0);
        // å†…å‡¹æ”¶æ•›ï¼ˆè§†è§‰â‰ˆ1.4æ¬¡ï¼‰ï¼Œä¿ç•™ç»†å¢¨å¸¦äº¤ç»™ç”©å°¾æ”¶å°½
        const w = Math.max(q.w * Math.pow(f, 2.8), q.w * 0.09);
        endW = w;
        const rFull = Math.sqrt(correctRadius((brushSize * q.w) / 100));
        const rNow  = Math.sqrt(correctRadius((brushSize * w) / 100));
        const off = (rFull - rNow) * 0.75 * side; // ä¸€ä¾§è¾¹ç¼˜é½å¹³ï¼Œå¦ä¸€ä¾§æ”¶æ‹¢
        brushStamp(q.x - q.dy * off / aspect, q.y + q.dx * off, q.dx, q.dy, w, q.ink, stroke.seed);
      } else {
        brushStamp(q.x, q.y, q.dx, q.dy, q.w, q.ink, stroke.seed); // é¡¿æ”¶åœ†å¤´
      }
    }
    if (fast && endW > 0.008) {
      // å‡ºé”‹ç”©å°¾ï¼šè¶Šè¿‡æŠ¬ç¬”ç‚¹çš„ç»†é¡»ï¼Œå»¶ç»­è¿‘æ®µå¼§åº¦ï¼Œå¦‚ç¬”æ¯«ç¦»çº¸ä¸€ç”©
      const last = pts[pts.length - 1];
      const rT = Math.sqrt(correctRadius((brushSize * last.w) / 100));
      let ang = Math.atan2(stroke.dirY, stroke.dirX);
      let ex = stroke.x, ey = stroke.y;
      const extLen = rT * 1.8, steps = 14, ds = extLen / steps;
      for (let i = 1; i <= steps; i++) {
        ang += curv * ds * 0.8;
        ex += Math.cos(ang) * ds / aspect;
        ey += Math.sin(ang) * ds;
        const w = endW * Math.pow(1 - i / steps, 1.4);
        if (w < 0.006) break;
        const rNow = Math.sqrt(correctRadius((brushSize * w) / 100));
        const off = (rT - rNow) * 0.75 * side;
        brushStamp(ex - Math.sin(ang) * off / aspect, ey + Math.cos(ang) * off,
                   Math.cos(ang), Math.sin(ang), w, last.ink, stroke.seed);
      }
    }
  }
  // ç¬”ç”»åˆå…¥æŸ“æ–™åœºï¼Œæ¸…ç©ºç¬”ç”»å±‚
  strokeCompositeProgram.bind();
  gl.uniform2f(strokeCompositeProgram.uniforms.texelSize, dye.texelSizeX, dye.texelSizeY);
  gl.uniform1i(strokeCompositeProgram.uniforms.uTarget, dye.read.attach(0));
  gl.uniform1i(strokeCompositeProgram.uniforms.uStroke, strokeLayer.read.attach(1));
  const c = strokeInkColor();
  gl.uniform3f(strokeCompositeProgram.uniforms.sColor, c.r, c.g, c.b);
  blit(dye.write); dye.swap();
  [strokeLayer.read, strokeLayer.write].forEach(f => {
    gl.bindFramebuffer(gl.FRAMEBUFFER, f.fbo);
    gl.clearColor(0, 0, 0, 0);
    gl.clear(gl.COLOR_BUFFER_BIT);
  });
  stroke = null;
}

// è°ƒè¯•è½¨è¿¹å±‚ï¼šURL åŠ  ?debug å¼€å¯
const dbg = location.search.includes('debug') ? (() => {
  const d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:8px;right:8px;z-index:99;background:rgba(0,0,0,.78);color:#7f7;font:12px/1.5 monospace;padding:10px;border-radius:6px;max-width:480px;white-space:pre;pointer-events:none;';

})() : null;
const hint = document.getElementById('hint');
let pointerDown = false, lastX = 0, lastY = 0, interacted = false;
function toUV(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) / rect.width,
    y: 1 - (e.clientY - rect.top) / rect.height
  };
}
let lastUpT = -1e9;
canvas.addEventListener('pointerdown', e => {
  if (pointerDown) { dbg && dbg('down BLOCKED: dup'); return; }
  if (e.button !== undefined && e.button !== 0) { dbg && dbg('down BLOCKED: btn ' + e.button); return; }
  if (isBrush() && performance.now() - lastUpT < 80) { dbg && dbg('down BLOCKED: debounce'); return; }
  dbg && dbg(`DOWN t=${performance.now().toFixed(0)} xy=${e.clientX},${e.clientY} p=${e.pressure} type=${e.pointerType}`);
  const p = toUV(e);
  pointerDown = true; lastX = p.x; lastY = p.y;
  pushUndo(); // æ¯ä¸ªåŠ¨ä½œå‰ç•™å¿«ç…§
  if (isBrush()) startStroke(p, e.pressure);
  else clickBloom(p.x, p.y, currentPigment);
  if (!interacted) { interacted = true; hint.classList.add('hide'); }
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!pointerDown) return;
  if (isBrush()) {
    if (!stroke) return;
    const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    for (const ev of evs) {
      const q = toUV(ev);
      const k = 1 - stabAmt * 0.9; // é˜²æŠ–ï¼šç¬”å°–ä½ç½®ä½Žé€šæ»¤æ³¢
      stroke.fx += (q.x - stroke.fx) * k;
      stroke.fy += (q.y - stroke.fy) * k;
      strokeTo({ x: stroke.fx, y: stroke.fy }, ev.pressure, ev.timeStamp);
    }
    return;
  }
  const p = toUV(e);
  const dx = p.x - lastX, dy = p.y - lastY;
  if (Math.abs(dx) + Math.abs(dy) > 0.0005) {
    dragSplat(p.x, p.y, dx, dy, currentPigment);
    lastX = p.x; lastY = p.y;
  }
});
window.addEventListener('pointerup', e => {
  dbg && dbg(`UP t=${performance.now().toFixed(0)} xy=${e.clientX},${e.clientY}`);
  pointerDown = false; lastUpT = performance.now(); endStroke();
});
window.addEventListener('pointercancel', () => {

  pointerDown = false; lastUpT = performance.now(); endStroke();
});

const BRUSH_OPTIONS = {

// â€”â€” æ’¤é”€ / é‡åšï¼ˆGPU åŠåˆ†è¾¨çŽ‡å¿«ç…§æ± ï¼Œ8 æ­¥ï¼‰ â€”â€”
var undoPool, undoStack, redoStack;
function initUndo() {
  // æ³¨æ„ï¼šinitUndo åœ¨è„šæœ¬æ—©æœŸï¼ˆinitFramebuffersï¼‰å³è¢«è°ƒç”¨ï¼Œå†…éƒ¨ä¸å¯å¼•ç”¨ let/const é¡¶å±‚å˜é‡
  if (undoPool) [...undoPool, ...undoStack, ...redoStack].forEach(f => {
    gl.deleteFramebuffer(f.fbo); gl.deleteTexture(f.texture);
  });
  undoPool = []; undoStack = []; redoStack = [];
  const w = Math.max(dye.width >> 1, 1), h = Math.max(dye.height >> 1, 1);
  for (let i = 0; i < 8; i++)
    undoPool.push(createFBO(w, h, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT, gl.LINEAR));
  updateHistoryButtons();
}
function allocSlot(stealFirst) {
  if (undoPool.length) return undoPool.pop();
  const a = stealFirst === 'redo' ? redoStack : undoStack;
  const b = stealFirst === 'redo' ? undoStack : redoStack;
  return a.length ? a.shift() : b.shift(); // æŒ¤æŽ‰æœ€æ—§ä¸€æ­¥
}
function pushUndo() {
  while (redoStack.length) undoPool.push(redoStack.pop());
  const s = allocSlot('undo');
  copyTo(s, dye.read.texture);
  undoStack.push(s);
  updateHistoryButtons();
}
function clearFBOT(f) {
  gl.bindFramebuffer(gl.FRAMEBUFFER, f.fbo);
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);
}
function clearCanvasOnly() {
  [dye.read, dye.write, velocity.read, velocity.write, strokeLayer.read, strokeLayer.write].forEach(clearFBOT);
}
function restoreFrom(s) {
  copyTo(dye.write, s.texture); dye.swap();
  [velocity.read, velocity.write, strokeLayer.read, strokeLayer.write].forEach(clearFBOT);
}
function undoOnce() {
  if (!undoStack.length) return;
  const cur = allocSlot('redo');
  copyTo(cur, dye.read.texture);
  redoStack.push(cur);
  const s = undoStack.pop();
  restoreFrom(s);
  undoPool.push(s);
  updateHistoryButtons();
}
function redoOnce() {
  if (!redoStack.length) return;
  const cur = allocSlot('undo');
  copyTo(cur, dye.read.texture);
  undoStack.push(cur);
  const s = redoStack.pop();
  restoreFrom(s);
  undoPool.push(s);
  updateHistoryButtons();
}
function resetHistory() {
  while (undoStack.length) undoPool.push(undoStack.pop());
  while (redoStack.length) undoPool.push(redoStack.pop());
  updateHistoryButtons();
}
function updateHistoryButtons() {
  const ub = document.getElementById('undoBtn'), rb = document.getElementById('redoBtn');
  if (!ub) return;
  ub.classList.toggle('disabled', !undoStack || !undoStack.length);
  rb.classList.toggle('disabled', !redoStack || !redoStack.length);
}
document.getElementById('undoBtn').addEventListener('click', undoOnce);
document.getElementById('redoBtn').addEventListener('click', redoOnce);
window.addEventListener('keydown', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  const k = e.key.toLowerCase();
  if (k === 'z') { e.preventDefault(); if (e.shiftKey) redoOnce(); else undoOnce(); }
  else if (k === 'y') { e.preventDefault(); redoOnce(); }
});
document.getElementById('clear').addEventListener('click', () => {

// ---------- å­˜ç”» / å–ç”» / ç…§ç‰‡ ----------
const SAVE_KEY = 'inkwash_painting_v3';
const SAVE_MAX = 1600;   // å­˜ç”»å¿«ç…§æœ€é•¿è¾¹
const ABSORB_MAX = 6.0;  // å¸å…‰åº¦ç¼–ç ä¸Šé™

const toast = document.getElementById('toast');
let toastTimer = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

// ç”¨ clearProgram(value=1) ä½œçº¹ç†æ‹·è´/ç¼©æ”¾
function copyTo(targetFBO, sourceTexture) {
  clearProgram.bind();
  gl.uniform2f(clearProgram.uniforms.texelSize, 1 / targetFBO.width, 1 / targetFBO.height);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, sourceTexture);
  gl.uniform1i(clearProgram.uniforms.uTexture, 0);
  gl.uniform1f(clearProgram.uniforms.value, 1.0);
  blit(targetFBO);
}

// å­˜ç”»ï¼šæŸ“æ–™åœºç¼©æ”¾è¯»å‡º â†’ sqrt ç¼–ç ä¸º PNGï¼ˆä½Žæµ“åº¦ç²¾åº¦æ›´é«˜ï¼‰â†’ localStorage
function saveState() {
  try {
    const scale = Math.min(1, SAVE_MAX / Math.max(dye.width, dye.height));
    const w = Math.max(1, Math.round(dye.width * scale));
    const h = Math.max(1, Math.round(dye.height * scale));
    const tmp = createFBO(w, h, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT, gl.LINEAR);
    copyTo(tmp, dye.read.texture);
    const pixels = new Float32Array(w * h * 4);
    gl.bindFramebuffer(gl.FRAMEBUFFER, tmp.fbo);
    gl.readPixels(0, 0, w, h, gl.RGBA, gl.FLOAT, pixels);
    gl.deleteFramebuffer(tmp.fbo);
    gl.deleteTexture(tmp.texture);
    // ä¸ŠåŠï¼šé¢œè‰²ä¸‰é€šé“ï¼›ä¸‹åŠï¼šåŽšåº¦é€šé“ï¼ˆæ²¹ç”»ç”¨ï¼‰ï¼Œå‡ sqrt ç¼–ç 
    const enc = v => Math.sqrt(Math.min(v / ABSORB_MAX, 1)) * 255;
    const c2d = document.createElement('canvas');
    c2d.width = w; c2d.height = h * 2;
    const ctx = c2d.getContext('2d');
    const img = ctx.createImageData(w, h * 2);
    const n = w * h;
    for (let i = 0; i < n; i++) {
      img.data[i * 4]     = enc(pixels[i * 4]);
      img.data[i * 4 + 1] = enc(pixels[i * 4 + 1]);
      img.data[i * 4 + 2] = enc(pixels[i * 4 + 2]);
      img.data[i * 4 + 3] = 255;
      const j = (n + i) * 4;
      const av = enc(pixels[i * 4 + 3]);
      img.data[j] = av; img.data[j + 1] = av; img.data[j + 2] = av; img.data[j + 3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    localStorage.setItem(SAVE_KEY, JSON.stringify({ w, h, mode: { c: canvasMode, b: brushTool }, png: c2d.toDataURL('image/png'), t: Date.now() }));
    showToast('ç”»å·²è—å…¥ç šåŒ£');
  } catch (err) {
    showToast('å­˜ç”»å¤±è´¥ï¼šæµè§ˆå™¨å­˜å‚¨ç©ºé—´ä¸è¶³');
  }
}

// å–ç”»ï¼šPNG è§£ç  â†’ è¿˜åŽŸå¸å…‰åº¦ â†’ å†™å›žæŸ“æ–™åœºï¼ˆæµåœºæ¸…é›¶ï¼‰
function loadState() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) { showToast('ç šåŒ£ä¸­å°šæ— å­˜ç”»'); return; }
  const { w, h, png, mode } = JSON.parse(raw);
  const image = new Image();
  image.onload = () => {
    const c2d = document.createElement('canvas');
    c2d.width = w; c2d.height = h * 2;
    const ctx = c2d.getContext('2d');
    ctx.drawImage(image, 0, 0);
    const img = ctx.getImageData(0, 0, w, h * 2).data;
    const dec = v => (v / 255) * (v / 255) * ABSORB_MAX;
    const n = w * h;
    const floats = new Float32Array(n * 4);
    for (let i = 0; i < n; i++) {
      floats[i * 4]     = dec(img[i * 4]);
      floats[i * 4 + 1] = dec(img[i * 4 + 1]);
      floats[i * 4 + 2] = dec(img[i * 4 + 2]);
      floats[i * 4 + 3] = dec(img[(n + i) * 4]);
    }
    if (mode && mode.c) applyMedium(mode.c, mode.b); // æ¢å¤è¯¥ç”»ä½œçš„ä»‹è´¨
    const tex = gl.createTexture();
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.FLOAT, floats);
    pushUndo(); // å–ç”»å‰ç•™å¿«ç…§
    clearCanvasOnly();
    copyTo(dye.write, tex);
    dye.swap();
    gl.deleteTexture(tex);
    if (!interacted) { interacted = true; hint.classList.add('hide'); }
    showToast('ç”»å·²å–å‡º');
  };
  image.src = png;
}

// ç…§ç‰‡ï¼šå½“å‰ç”»é¢ï¼ˆå«å®£çº¸è´¨æ„Ÿï¼‰å¯¼å‡ºä¸º PNG
function exportPhoto() {

}

document.getElementById('save').addEventListener('click', saveState);

// ---------- Loop ----------
let lastTime = performance.now();
function frame(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.0166);
  lastTime = now;
  if (!isBrush()) step(dt); // æ¯›ç¬”æ¨¡å¼ï¼šç¬”è¿¹é™æ­¢ï¼Œä¸è·‘æµä½“
  render();
  requestAnimationFrame(frame);
}

// å¼€å·ä¸€ç‚¹æ·¡å¢¨ï¼ˆæ™•æŸ“ç¬”æ—¶ï¼‰
